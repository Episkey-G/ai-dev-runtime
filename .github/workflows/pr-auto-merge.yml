name: PR Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, labeled, ready_for_review]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-automerge-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  enable-auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == github.event.repository.default_branch &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Validate pull request payload
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${{ github.event.pull_request.number }}" ]]; then
            echo "错误：缺少 PR 编号，无法启用自动合并。" >&2
            exit 1
          fi

      - name: Enable auto-merge with squash strategy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "错误：PR_NUMBER 为空，无法执行自动合并命令。" >&2
            exit 1
          fi

          if ! gh pr merge "${PR_NUMBER}" --auto --squash --delete-branch; then
            echo "错误：自动合并启用失败。请确认仓库已开启 Auto-merge，且分支保护要求与必需检查已正确配置。" >&2
            exit 1
          fi
