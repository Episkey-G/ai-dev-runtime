name: PR Quality Gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

concurrency:
  group: pr-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Run type check and build
        run: npm run build

  review-summary:
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Upsert automated review comment
        uses: actions/github-script@v8
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- ai-dev:auto-review -->'
            const prNumber = Number(process.env.PR_NUMBER || '')
            const qualityResult = process.env.QUALITY_RESULT || 'unknown'

            if (!Number.isFinite(prNumber) || prNumber <= 0) {
              core.setFailed('错误：PR 编号无效，无法回写自动审查结果。')
              return
            }

            let body = ''
            if (qualityResult === 'success') {
              body = `${marker}\n## 自动代码审查结果\n\n- 状态：通过\n- 检查项：\`npm run lint\`、\`npm test\`、\`npm run build\`\n\n已满足自动合并前置检查，可按需添加 \`automerge\` 标签触发自动合并。`
            } else if (qualityResult === 'failure') {
              body = `${marker}\n## 自动代码审查结果\n\n- 状态：未通过\n- 请查看本次 Workflow 日志定位失败步骤并修复后重试。\n\n未通过前不会进入自动合并。`
            } else if (qualityResult === 'cancelled') {
              body = `${marker}\n## 自动代码审查结果\n\n- 状态：已取消\n- 请重新触发 CI 后再继续。`
            } else {
              body = `${marker}\n## 自动代码审查结果\n\n- 状态：${qualityResult}\n- 请查看 Workflow 详情确认结果。`
            }

            const {owner, repo} = context.repo
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            })

            const botComment = comments.find(comment =>
              comment.user?.login === 'github-actions[bot]' &&
              typeof comment.body === 'string' &&
              comment.body.includes(marker),
            )

            if (botComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: botComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              })
            }
